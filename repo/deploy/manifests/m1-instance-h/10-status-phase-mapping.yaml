apiVersion: v1
kind: ConfigMap
metadata:
  name: ani-instance-status-phase-mapping
  namespace: ani-system
  labels:
    app.kubernetes.io/name: ani-instance-status-phase-mapping
    app.kubernetes.io/part-of: ani-platform
    ani.kubercloud.io/stage: m1-instance-h
data:
  required-flow: |
    WorkloadProviderApply
    provider observation reader
    WorkloadStatusReconciler
    WorkloadRuntime status write-back
    lifecycle audit closure
  phase-mapping: |
    pending|creating|provisioning|scheduled -> provisioning
    ready|running|started -> running
    stopping|terminating -> stopping
    stopped|succeeded|completed -> stopped
    deleting -> deleting
    deleted -> deleted
    failed|error|crashloopbackoff -> failed
  result-contract: |
    status
    changed
    reason
    reconciledAt
  future-provider-policy: |
    Kubernetes Deployment, Kubernetes Job, and KubeVirt VirtualMachine status
    readers may use provider-specific APIs inside adapters only. They must emit
    normalized provider observations and preserve tenant, instance, audit, and
    resource ref correlation.
