apiVersion: v1
kind: ConfigMap
metadata:
  name: ani-instance-provider-dry-run-flow
  namespace: ani-system
  labels:
    app.kubernetes.io/name: ani-instance-provider-dry-run-flow
    app.kubernetes.io/part-of: ani-platform
    ani.kubercloud.io/stage: m1-instance-f
data:
  required-flow: |
    PlanningRuntime
    WorkloadRenderer
    WorkloadAdmission
    WorkloadPlanAuditStore
    WorkloadProviderDryRun
    future provider apply/create
  result-contract: |
    accepted
    provider
    manifestCount
    reason
    warnings
    checkedAt
  future-server-side-policy: |
    Kubernetes and KubeVirt providers must use Kubernetes server-side dry-run
    with dryRun=All. Customer VM/cloud providers must expose equivalent
    validation APIs before any create action.
