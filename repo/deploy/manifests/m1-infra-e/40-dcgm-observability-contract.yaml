apiVersion: v1
kind: ConfigMap
metadata:
  name: ani-dcgm-observability-contract
  namespace: ani-gpu-system
  labels:
    app.kubernetes.io/name: ani-dcgm-observability-contract
    app.kubernetes.io/part-of: ani-platform
data:
  metrics: |
    DCGM_FI_DEV_GPU_UTIL
    DCGM_FI_DEV_MEM_COPY_UTIL
    DCGM_FI_DEV_FB_USED
    DCGM_FI_DEV_FB_FREE
    DCGM_FI_DEV_POWER_USAGE
  scrape-contract: |
    DCGM Exporter metrics must be scraped by the platform observability profile.
    Tenant and workload attribution is added by ANI control-plane metadata joins.
