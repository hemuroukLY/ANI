apiVersion: v1
kind: ConfigMap
metadata:
  name: ani-platform-config
  namespace: ani-system
  labels:
    app.kubernetes.io/name: ani-platform-config
    app.kubernetes.io/part-of: ani-platform
data:
  kubernetes.version.min: "1.28.0"
  kubernetes.version.target: "1.36.x"
  network.cni.preferred: "kubeovn"
  network.policy.default: "deny"
  storage.object.bucket.models: "ani-models"
  storage.object.bucket.datasets: "ani-datasets"
  storage.object.bucket.kbDocs: "ani-kb-docs"
  postgresql.requiredRLS: "true"
  nats.jetstream.required: "true"
  install.mode.supported: "rke2,attach-k8s,karmada"
---
apiVersion: v1
kind: Secret
metadata:
  name: ani-bootstrap-placeholders
  namespace: ani-system
  labels:
    app.kubernetes.io/name: ani-bootstrap-placeholders
    app.kubernetes.io/part-of: ani-platform
type: Opaque
stringData:
  database-url: "REPLACE_WITH_POSTGRESQL_URL"
  nats-url: "REPLACE_WITH_NATS_URL"
  redis-url: "REPLACE_WITH_REDIS_URL"
  minio-endpoint: "REPLACE_WITH_MINIO_ENDPOINT"
