apiVersion: v1
kind: ConfigMap
metadata:
  name: ani-instance-store-contract
  namespace: ani-system
  labels:
    app.kubernetes.io/name: ani-instance-store-contract
    app.kubernetes.io/part-of: ani-platform
    ani.kubercloud.io/stage: m1-instance-j
data:
  port: |
    WorkloadInstanceStore
  adapter: |
    pkg/adapters/runtime.MetadataInstanceStore
  table: |
    workload_instances
  required-fields: |
    tenant id
    instance id
    instance name
    workload kind
    provider
    audit id
    provider id
    resource refs
    workload state
    networks
    storage
  persistence-policy: |
    WorkloadInstanceOrchestrator must persist planned status before real
    provider observation and persist reconciled status after
    WorkloadStatusReconciler returns.
  tenant-isolation: |
    workload_instances must use tenant RLS with app.current_tenant_id.
