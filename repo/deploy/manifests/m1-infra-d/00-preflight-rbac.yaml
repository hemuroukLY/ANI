apiVersion: v1
kind: ServiceAccount
metadata:
  name: ani-cluster-preflight
  namespace: ani-system
  labels:
    app.kubernetes.io/name: ani-cluster-preflight
    app.kubernetes.io/part-of: ani-platform
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ani-cluster-preflight
  labels:
    app.kubernetes.io/name: ani-cluster-preflight
    app.kubernetes.io/part-of: ani-platform
rules:
  - apiGroups: [""]
    resources: ["namespaces", "nodes", "secrets", "services"]
    verbs: ["get", "list"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses"]
    verbs: ["get", "list"]
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list"]
  - apiGroups: ["kubeovn.io"]
    resources: ["vpcs", "subnets"]
    verbs: ["get", "list"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ani-cluster-preflight
  labels:
    app.kubernetes.io/name: ani-cluster-preflight
    app.kubernetes.io/part-of: ani-platform
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ani-cluster-preflight
subjects:
  - kind: ServiceAccount
    name: ani-cluster-preflight
    namespace: ani-system
