apiVersion: batch/v1
kind: Job
metadata:
  name: ani-gpu-e2e-preflight
  namespace: ani-system
  labels:
    app.kubernetes.io/name: ani-gpu-e2e-preflight
    app.kubernetes.io/part-of: ani-platform
    ani.kubercloud.io/stage: m1-infra-f
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ani-gpu-e2e-preflight
        app.kubernetes.io/part-of: ani-platform
        ani.kubercloud.io/stage: m1-infra-f
    spec:
      restartPolicy: Never
      serviceAccountName: ani-gpu-e2e-preflight
      containers:
        - name: preflight
          image: bitnami/kubectl:1.30
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "/config/preflight.sh"]
          env:
            - name: ANI_GPU_REQUIRE_HAMI_ALLOCATABLE
              value: "false"
            - name: ANI_GPU_REQUIRE_DCGM_SERVICE
              value: "false"
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: ani-gpu-e2e-preflight
            defaultMode: 0755
