apiVersion: v1
kind: ServiceAccount
metadata:
  name: ani-gpu-e2e-preflight
  namespace: ani-system
  labels:
    app.kubernetes.io/name: ani-gpu-e2e-preflight
    app.kubernetes.io/part-of: ani-platform
    ani.kubercloud.io/stage: m1-infra-f
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ani-gpu-e2e-preflight
  labels:
    app.kubernetes.io/name: ani-gpu-e2e-preflight
    app.kubernetes.io/part-of: ani-platform
    ani.kubercloud.io/stage: m1-infra-f
rules:
  - apiGroups: [""]
    resources: ["configmaps", "namespaces", "nodes", "pods", "services"]
    verbs: ["get", "list"]
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list"]
  - apiGroups: ["scheduling.volcano.sh"]
    resources: ["queues"]
    verbs: ["get", "list"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ani-gpu-e2e-preflight
  labels:
    app.kubernetes.io/name: ani-gpu-e2e-preflight
    app.kubernetes.io/part-of: ani-platform
    ani.kubercloud.io/stage: m1-infra-f
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ani-gpu-e2e-preflight
subjects:
  - kind: ServiceAccount
    name: ani-gpu-e2e-preflight
    namespace: ani-system
