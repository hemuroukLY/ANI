apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ani-tenant-default-deny
  namespace: ani-tenant-template
  labels:
    app.kubernetes.io/part-of: ani-platform
    ani.kubercloud.io/tenant-id: REPLACE_WITH_TENANT_UUID
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ani-allow-gateway-to-tenant-services
  namespace: ani-tenant-template
  labels:
    app.kubernetes.io/part-of: ani-platform
    ani.kubercloud.io/tenant-id: REPLACE_WITH_TENANT_UUID
spec:
  podSelector:
    matchLabels:
      ani.kubercloud.io/exposure: gateway
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ani-system
          podSelector:
            matchLabels:
              app.kubernetes.io/name: ani-gateway
      ports:
        - protocol: TCP
          port: 8000
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ani-allow-tenant-dns
  namespace: ani-tenant-template
  labels:
    app.kubernetes.io/part-of: ani-platform
    ani.kubercloud.io/tenant-id: REPLACE_WITH_TENANT_UUID
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
