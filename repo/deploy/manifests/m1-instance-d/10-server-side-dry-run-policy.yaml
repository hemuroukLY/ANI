apiVersion: v1
kind: ConfigMap
metadata:
  name: ani-instance-server-side-dry-run-policy
  namespace: ani-system
  labels:
    app.kubernetes.io/name: ani-instance-server-side-dry-run-policy
    app.kubernetes.io/part-of: ani-platform
    ani.kubercloud.io/stage: m1-instance-d
data:
  required-flow: |
    PlanningRuntime
    WorkloadRenderer
    LocalAdmissionGuard
    provider server-side dry-run
    audit log
    controlled apply/create
  audit-fields: |
    tenantID
    instanceID
    workloadKind
    provider
    manifestKind
    renderMode
    admissionResult
    serverSideDryRunResult
  future-provider-notes: |
    Kubernetes provider should use dryRun=All before apply.
    KubeVirt provider should use the same Kubernetes server-side dry-run path.
    Customer cloud/VM providers must expose equivalent validation before create.
