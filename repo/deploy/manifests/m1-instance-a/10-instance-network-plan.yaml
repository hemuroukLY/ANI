apiVersion: v1
kind: ConfigMap
metadata:
  name: ani-instance-network-plan
  namespace: ani-system
  labels:
    app.kubernetes.io/name: ani-instance-network-plan
    app.kubernetes.io/part-of: ani-platform
    ani.kubercloud.io/stage: m1-instance-a
data:
  network-planes: |
    tenant_vpc: tenant-owned business traffic; VM/container/GPU container may communicate here
    foundation_mesh: platform-controlled east-west service connectivity outside tenant VPC
    storage: storage backend access for MinIO, PVC provisioners, image import, and model files
    management: control-plane operations, health checks, logs, metrics, SSH/VNC proxy
    public_ingress: explicit ingress through ANI Gateway or configured ingress adapter
  connectivity-policy: |
    VM and container instances that need business-level communication should
    share tenant_vpc attachments. Platform services, observability, storage,
    and management access should use foundation_mesh/storage/management planes
    so tenant VPCs do not become a nested catch-all network.
  default-attachments-by-kind: |
    vm: tenant_vpc, foundation_mesh, management
    container: tenant_vpc, foundation_mesh
    gpu_container: tenant_vpc, foundation_mesh, storage
    inference: tenant_vpc, foundation_mesh, storage, public_ingress
    notebook: tenant_vpc, foundation_mesh, storage, public_ingress
    agent_sandbox: tenant_vpc, foundation_mesh with restricted egress
    batch_job: tenant_vpc, foundation_mesh, storage
  isolation-rules: |
    tenant_vpc is private by default.
    foundation_mesh must not expose arbitrary tenant workloads to each other.
    storage plane must be policy-restricted to declared buckets, PVCs, or services.
    management plane must be reachable only from platform control services.
