apiVersion: v1
kind: ConfigMap
metadata:
  name: ani-instance-plan-audit-contract
  namespace: ani-system
  labels:
    app.kubernetes.io/name: ani-instance-plan-audit-contract
    app.kubernetes.io/part-of: ani-platform
    ani.kubercloud.io/stage: m1-instance-e
data:
  port: |
    WorkloadPlanAuditStore
  adapter: |
    pkg/adapters/runtime.MetadataPlanAuditStore
  table: |
    instance_plan_audits
  purpose: |
    Persist the instance planning, provider rendering, and admission review
    trail before future server-side dry-run or real create/apply actions.
  required-fields: |
    tenant_id
    user_id
    instance_id
    instance_name
    workload_kind
    provider
    manifest_count
    rendered_manifests
    admission_allowed
    admission_reason
    admission_warnings
    created_at
  isolation: |
    instance_plan_audits must use tenant RLS with app.current_tenant_id.
