apiVersion: v1
kind: Namespace
metadata:
  name: ani-s05-objectstore
  labels:
    app.kubernetes.io/part-of: ani-core
    ani.dev/sprint: sprint13
    ani.dev/slice: s05-objectstore-minio
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ani-s05-minio
  namespace: ani-s05-objectstore
  labels:
    app.kubernetes.io/name: minio
    app.kubernetes.io/part-of: ani-core
    ani.dev/sprint: sprint13
    ani.dev/slice: s05-objectstore-minio
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: minio
      ani.dev/slice: s05-objectstore-minio
  template:
    metadata:
      labels:
        app.kubernetes.io/name: minio
        app.kubernetes.io/part-of: ani-core
        ani.dev/sprint: sprint13
        ani.dev/slice: s05-objectstore-minio
    spec:
      containers:
        - name: minio
          image: minio/minio:RELEASE.2025-04-22T22-12-26Z
          imagePullPolicy: IfNotPresent
          args:
            - server
            - /data
            - --address
            - :9000
            - --console-address
            - :9001
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: ani-s05-minio-root
                  key: access_key_id
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ani-s05-minio-root
                  key: secret_access_key
          ports:
            - name: s3
              containerPort: 9000
            - name: console
              containerPort: 9001
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: s3
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: s3
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: ani-s05-minio
  namespace: ani-s05-objectstore
  labels:
    app.kubernetes.io/name: minio
    app.kubernetes.io/part-of: ani-core
    ani.dev/sprint: sprint13
    ani.dev/slice: s05-objectstore-minio
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: minio
    ani.dev/slice: s05-objectstore-minio
  ports:
    - name: s3
      port: 9000
      targetPort: s3
      nodePort: 30900
    - name: console
      port: 9001
      targetPort: console
