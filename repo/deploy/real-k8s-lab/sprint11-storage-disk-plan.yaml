  pre_mount_osd_devices: false
  require_explicit_wipe_approval: true
  require_no_filesystem_signature: true
  require_no_mountpoint: true
  require_no_partition_table: true
  vm_primary_pool: ceph-rbd-ssd
  hdd_policy: separate_class_or_exclude_initially
  forbidden_device_selectors:
    - /dev/sdX
    - kernel_name_order
  allowed_device_selectors:
    - /dev/disk/by-id
    - wwn
    - serial
